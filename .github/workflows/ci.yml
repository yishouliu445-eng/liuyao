name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - codex/**
  pull_request:

jobs:
  compose-config:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ci-password
      DB_USER: liuyao
      DB_PORT: 5433
      APP_PORT: 8080
      H5_PORT: 3000
      SERVER_PORT: 8080
      LLM_ENABLED: "true"
      LLM_API_KEY: ci-key
      DASHSCOPE_API_KEY: ci-dashscope-key
      LLM_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      LLM_MODEL: qwen-plus
      LLM_FOLLOWUP_MODEL: qwen-turbo
      LLM_TIMEOUT_MS: "15000"
      LLM_MAX_TOKENS: "1500"
      LLM_TEMPERATURE: "0.5"
      PROMPT_VERSION: v1
      SESSION_API_ENABLED: "true"
      ORCHESTRATED_ANALYSIS: "true"
      WORKER_ID: python-worker-1
      POLL_INTERVAL_SECONDS: "5"
      EMBEDDING_PROVIDER: dashscope
      EMBEDDING_MODEL: text-embedding-v4
      EMBEDDING_DIM: ""
      EMBEDDING_BASE_URL: ""
      LIUYAO_EMBEDDING_API_KEY: ""
      EMBEDDING_TIMEOUT_SECONDS: "30"
      EMBEDDING_BATCH_SIZE: "16"
      VECTOR_STORE_DIM: "1024"
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: liuyao
          POSTGRES_USER: liuyao
          POSTGRES_PASSWORD: liuyao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U liuyao"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: liuyao-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run backend tests
        run: mvn test

  worker-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: liuyao-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: liuyao-worker/requirements.txt
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-chi-sim
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      - name: Run worker tests
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: liuyao-h5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: liuyao-h5/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - compose-config
      - backend-test
      - worker-test
      - frontend-build
    steps:
      - uses: actions/checkout@v4
      - name: Build app image
        run: docker build -t liuyao-app:ci -f liuyao-app/Dockerfile liuyao-app
      - name: Build worker image
        run: docker build -t liuyao-worker:ci -f liuyao-worker/Dockerfile liuyao-worker
      - name: Build frontend image
        run: docker build -t liuyao-h5:ci -f liuyao-h5/Dockerfile liuyao-h5

  prompt-regression:
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: liuyao-app
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            prompts:
              - 'liuyao-app/src/main/resources/prompts/**'
      - uses: actions/setup-java@v4
        if: steps.changes.outputs.prompts == 'true'
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run prompt regression
        if: steps.changes.outputs.prompts == 'true'
        run: |
          if [ -f src/test/java/com/yishou/liuyao/analysis/PromptRegressionTest.java ]; then
            mvn -Dspring.profiles.active=prompt-test -Dtest=PromptRegressionTest test
          else
            echo "PromptRegressionTest not implemented yet, skipping."
          fi
      - name: Skip prompt regression
        if: steps.changes.outputs.prompts != 'true'
        run: echo "No prompt changes detected."
