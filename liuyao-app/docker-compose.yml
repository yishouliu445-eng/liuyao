version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: liuyao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liuyao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - liuyao-postgres-data:/var/lib/postgresql/data

volumes:
  liuyao-postgres-data:
