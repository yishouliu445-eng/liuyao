spring:
  application:
    name: liuyao-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/liuyao}
    username: ${DB_USERNAME:dify}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

liuyao:
  rules:
    version: ${LIUYAO_RULES_VERSION:v1}
  llm:
    enabled: ${LIUYAO_LLM_ENABLED:false}
    base-url: ${LIUYAO_LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LIUYAO_LLM_API_KEY:}
    model: ${LIUYAO_LLM_MODEL:gpt-4o}
    timeout-ms: 8000
